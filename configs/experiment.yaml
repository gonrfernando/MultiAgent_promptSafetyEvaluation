experiment:
  name: agent-disagreement-safety
  version: "0.1.0"
  seed: 42

paths:
  prompts_dir: data/prompts
  prompts_file: data/prompts/processed/prompts.jsonl
  prompts_source_txt: prompts.txt
  prompts_source_csv: data/prompts/source/harmbench_multilingual.csv
  prompts_overrides: data/prompts/manual/overrides.jsonl
  judges_config: configs/judges.yaml
  responses_dir: data/responses
  evaluations_dir: data/evaluations
  labels_dir: data/labels
  results_dir: results/runs

languages:
  - es_neutral
  - es_mx_gdl
  - es_ar_caba
  - es_cl_santiago
  - es_es_bcn
  - es_uy

judges:
  - security
  - policy
  - critical

generation:
  temperature: 0.7
  max_tokens: 1024

evaluation:
  temperature: 0.0
  max_tokens: 512
